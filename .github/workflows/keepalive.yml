name: keep-alive

# Render's free tier puts the service to sleep after ~15 min idle, and the cold
# wake-up takes ~12s — long enough that the Google Sheet's IMPORTDATA times out
# and shows blank. This pings the service every few minutes so it stays awake.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # also runnable by hand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the server
        run: curl -fsS --max-time 60 https://uncvrd-ad-suite.onrender.com/ -o /dev/null || true
