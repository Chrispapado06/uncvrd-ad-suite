name: keep-alive

# Pings the warm-up endpoint so Render's free dyno never sleeps AND both data caches
# stay built — so the Google Sheet's IMPORTDATA always loads fast.
# NOTE: GitHub's scheduler heavily throttles cron (often only every few HOURS), so this
# is a backup only. For reliable 5-min pings use cron-job.org / UptimeRobot on /warm.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm the server + caches
        run: curl -fsS --max-time 120 "https://uncvrd-ad-suite.onrender.com/warm?key=uncvrd2026" -o /dev/null || true
